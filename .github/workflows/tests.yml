name: tests

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  phpunit:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.3', '8.4', '8.5']
        laravel-version: ['12', '13']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: |
          if [ "${{ matrix.laravel-version }}" = "12" ]; then
            composer update --with="laravel/framework:^12.55" --with="orchestra/testbench:^10.11" --prefer-dist --no-interaction
          else
            composer install --prefer-dist --no-interaction
          fi

      - name: Run test suite
        run: composer test

  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: xdebug

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Generate coverage report
        run: composer test:coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  wayfinder:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install dependencies with Wayfinder
        run: |
          composer require --dev laravel/wayfinder --prefer-dist --no-interaction

      - name: Run Wayfinder compatibility gate
        run: composer test:wayfinder
